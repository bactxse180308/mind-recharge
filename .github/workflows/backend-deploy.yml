name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "mind-recharge-be/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: ${{ secrets.VPS_HOST }}
      DEPLOY_PORT: ${{ secrets.VPS_PORT }}
      DEPLOY_USER: ${{ secrets.VPS_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      APP_DIR: ${{ vars.BACKEND_APP_DIR }}
      SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME }}
      HEALTHCHECK_URL: ${{ vars.BACKEND_HEALTHCHECK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Validate deploy configuration
        run: |
          set -euo pipefail
          test -n "${DEPLOY_HOST}"
          test -n "${DEPLOY_USER}"
          test -n "${DEPLOY_SSH_KEY}"

      - name: Build backend
        working-directory: mind-recharge-be
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean test bootJar

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${DEPLOY_SSH_KEY}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if ! grep -q "BEGIN .* PRIVATE KEY" ~/.ssh/deploy_key; then
            echo "VPS_SSH_PRIVATE_KEY is not a valid OpenSSH private key"
            exit 1
          fi

      - name: Trust VPS host key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Diagnose SSH connection
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploy host: ${DEPLOY_HOST}"
          echo "Deploy port: ${DEPLOY_PORT:-22}"
          echo "Deploy user: ${DEPLOY_USER}"
          echo "App dir: ${APP_DIR:-/opt/myapp}"

          ssh -vvv -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=15 \
            -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "echo 'SSH authentication succeeded'; whoami; pwd"

      - name: Upload jar
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="${APP_DIR:-/opt/myapp}"
          echo "Uploading jar to ${DEPLOY_USER}@${DEPLOY_HOST}:${APP_DIR}/app.jar.upload"
          scp -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -P "${DEPLOY_PORT:-22}" \
            "mind-recharge-be/build/libs/reminer-0.0.1-SNAPSHOT.jar" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${APP_DIR}/app.jar.upload"

      - name: Restart service and verify
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="${APP_DIR:-/opt/myapp}"
          SERVICE_NAME="${SERVICE_NAME:-myapp.service}"
          HEALTHCHECK_URL="${HEALTHCHECK_URL:-http://127.0.0.1:8080/api/v1/health}"

          echo "Restarting service ${SERVICE_NAME}"
          echo "Healthcheck URL: ${HEALTHCHECK_URL}"

          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" <<EOF
          set -euo pipefail
          APP_DIR="${APP_DIR}"
          SERVICE_NAME="${SERVICE_NAME}"
          HEALTHCHECK_URL="${HEALTHCHECK_URL}"

          echo "Remote user: \$(whoami)"
          echo "Remote app dir: \${APP_DIR}"
          ls -ld "\${APP_DIR}"

          test -f "\${APP_DIR}/app.jar.upload"

          if [ -f "\${APP_DIR}/app.jar" ]; then
            cp "\${APP_DIR}/app.jar" "\${APP_DIR}/app.jar.bak.\$(date +%F-%H%M%S)"
          fi

          mv "\${APP_DIR}/app.jar.upload" "\${APP_DIR}/app.jar"

          systemctl restart "\${SERVICE_NAME}"
          systemctl is-active --quiet "\${SERVICE_NAME}"

          for i in $(seq 1 18); do
            if curl --fail --silent --show-error "\${HEALTHCHECK_URL}" >/dev/null; then
              echo "Healthcheck succeeded on attempt \$i"
              exit 0
            fi

            echo "Waiting for app to become healthy... attempt \$i/18"
            sleep 5
          done

          echo "Healthcheck did not succeed within 90 seconds"
          systemctl status "\${SERVICE_NAME}" --no-pager || true
          exit 1
          EOF

      - name: Show recent logs on failure
        if: failure()
        shell: bash
        run: |
          set +e
          SERVICE_NAME="${SERVICE_NAME:-myapp.service}"
          echo "Failure diagnostics for ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "journalctl -u ${SERVICE_NAME} -n 120 --no-pager"
