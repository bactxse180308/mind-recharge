# =============================================================================
# prometheus.yml – Mind Recharge Backend
# Scrapes Spring Boot Actuator Prometheus endpoint
# =============================================================================

global:
  scrape_interval:     15s   # Tần suất scrape mặc định
  evaluation_interval: 15s   # Tần suất đánh giá alert rules
  scrape_timeout:      10s

  external_labels:
    environment: 'production'
    project:     'mind-recharge'

# =============================================================================
# Scrape Configurations
# =============================================================================
scrape_configs:

  # Prometheus tự giám sát chính nó
  - job_name: 'prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus-self'

  # -----------------------------------------------------------------------
  # Spring Boot Actuator – Mind Recharge Backend
  # Endpoint: GET /actuator/prometheus
  # Yêu cầu: spring-boot-starter-actuator + micrometer-registry-prometheus
  # -----------------------------------------------------------------------
  - job_name: 'mind-recharge-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    scrape_timeout:  8s
    static_configs:
      - targets: ['localhost:8080']
        labels:
          application: 'mind-recharge-be'
          service:     'spring-boot'
          team:        'backend'
